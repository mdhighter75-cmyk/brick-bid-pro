<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brick Bid Pro – Masonry Job Calculator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root { --brick:#b23a2a; --dark:#1e1e1e; --tan:#f7f1e8; --muted:#6b6b6b; }
  * { box-sizing:border-box; margin:0; padding:0; font-family: -apple-system, Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
  body { background:var(--tan); color:var(--dark); }
  header { background:#fff; border-bottom:1px solid #e2d8cc; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:10; }
  header h1 { font-size:18px; }
  header h1 span { color:var(--brick); font-weight:800; }
  header small { display:block; font-size:12px; color:var(--muted); font-weight:500; }
  .badge { background:#e8f5e9; color:#1b7a3a; font-size:11px; font-weight:700; padding:4px 8px; border-radius:20px; }
  .badge.locked { background:#fff0ee; color:#b23a2a; }
  .wrap { max-width:720px; margin:0 auto; padding:20px; }
  .card { background:#fff; border-radius:16px; padding:20px; box-shadow:0 2px 12px rgba(0,0,0,.05); margin-bottom:16px; }
  h2 { font-size:16px; margin-bottom:12px; }
  label { font-size:12px; color:var(--muted); display:block; margin-bottom:4px; margin-top:12px; }
  input { width:100%; padding:12px; border:1px solid #d8cfc4; border-radius:10px; font-size:16px; background:#fcfaf7; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media(max-width:500px){ .grid{ grid-template-columns:1fr; } }
  .results { background:#faf6f0; border-radius:12px; padding:16px; margin-top:16px; }
  .results div { display:flex; justify-content:space-between; padding:6px 0; font-size:15px; }
  .results .total { font-weight:800; font-size:18px; border-top:1px solid #ddd0c2; margin-top:6px; padding-top:10px; }
  button { width:100%; padding:14px; border:none; border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; }
  .btn-primary { background:var(--brick); color:#fff; }
  .btn-secondary { background:#eee6db; color:#333; margin-top:10px; }
  .btn-stripe { background:#635bff; color:#fff; margin-top:10px; }
  .muted { color:var(--muted); font-size:12px; text-align:center; margin-top:10px; }
  .top-actions { display:flex; gap:8px; align-items:center; }
  .top-actions button { width:auto; padding:8px 12px; font-size:13px; border-radius:8px; background:#f0e8dc; color:#333; }
</style>
</head>
<body>
<header>
  <div>
    <h1><span>Brick Bid Pro</span></h1>
    <small>Masonry Job Calculator</small>
  </div>
  <div class="top-actions">
    <span id="proBadge" class="badge locked">Free</span>
    <button onclick="shareApp()">Share</button>
    <button onclick="document.getElementById('settingsCard').scrollIntoView({behavior:'smooth'})">Settings</button>
  </div>
</header>

<div class="wrap">
  <div class="card">
    <h2>Job Details</h2>
    <label>Job / Client Name</label>
    <input id="jobName" placeholder="e.g. Smith Patio Wall">
    <div class="grid">
      <div>
        <label>Wall Length (ft)</label>
        <input id="length" type="number" value="20" step="0.1">
      </div>
      <div>
        <label>Wall Height (ft)</label>
        <input id="height" type="number" value="4" step="0.1">
      </div>
      <div>
        <label>Brick price ($ / each)</label>
        <input id="brickPrice" type="number" value="0.65" step="0.01">
      </div>
      <div>
        <label>Waste %</label>
        <input id="waste" type="number" value="10" step="1">
      </div>
      <div>
        <label>Mortar bags</label>
        <input id="mortarBags" type="number" value="3" step="1">
      </div>
      <div>
        <label>Mortar $ / bag</label>
        <input id="mortarPrice" type="number" value="8.5" step="0.1">
      </div>
      <div>
        <label>Labor rate ($ / hr)</label>
        <input id="laborRate" type="number" value="55" step="1">
      </div>
      <div>
        <label>Estimated hours</label>
        <input id="laborHours" type="number" value="8" step="0.5">
      </div>
    </div>

    <div class="results" id="results">
      <div><span>Wall area</span><strong id="rArea">— sq ft</strong></div>
      <div><span>Bricks needed</span><strong id="rBricks">—</strong></div>
      <div><span>Materials</span><strong id="rMaterials">—</strong></div>
      <div><span>Labor</span><strong id="rLabor">—</strong></div>
      <div class="total"><span>Total Bid</span><strong id="rTotal">$0.00</strong></div>
    </div>

    <button class="btn-primary" onclick="calculate()" style="margin-top:14px">Calculate Bid</button>
    <button class="btn-secondary" onclick="downloadPDF()" id="pdfBtn">Download PDF Quote</button>
    <button class="btn-stripe" onclick="goStripe()" id="stripeBtn">Unlock Pro PDF – $9/mo</button>
    <p class="muted" id="proNote">Free version adds a watermark. Add ?pro=1 to your link to unlock Pro, or connect Stripe.</p>
  </div>

  <div class="card" id="settingsCard">
    <h2>Settings</h2>
    <label>Your Business Name (shows on PDF)</label>
    <input id="businessName" placeholder="Highter Masonry" value="Highter Masonry">
    <label>Stripe Checkout Link</label>
    <input id="stripeLink" placeholder="https://buy.stripe.com/..." value="https://buy.stripe.com/5kQfZj0Ko1uC634eGwafS04">
    <p class="muted">Your Stripe $9/mo link is built in. You can change it here anytime.</p>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
let isPro = params.get('pro') === '1';

function updateProUI(){
  const badge = document.getElementById('proBadge');
  const stripeBtn = document.getElementById('stripeBtn');
  const note = document.getElementById('proNote');
  if(isPro){
    badge.textContent = 'Pro';
    badge.className = 'badge';
    stripeBtn.style.display = 'none';
    note.textContent = 'Pro PDF quotes unlocked.';
  } else {
    badge.textContent = 'Free';
    badge.className = 'badge locked';
    stripeBtn.style.display = 'block';
    note.textContent = 'Free version adds a watermark. Add ?pro=1 to unlock Pro, or connect Stripe.';
  }
}
updateProUI();

function calculate(){
  const L = parseFloat(document.getElementById('length').value) || 0;
  const H = parseFloat(document.getElementById('height').value) || 0;
  const brickPrice = parseFloat(document.getElementById('brickPrice').value) || 0;
  const waste = parseFloat(document.getElementById('waste').value) || 0;
  const mortarBags = parseFloat(document.getElementById('mortarBags').value) || 0;
  const mortarPrice = parseFloat(document.getElementById('mortarPrice').value) || 0;
  const laborRate = parseFloat(document.getElementById('laborRate').value) || 0;
  const laborHours = parseFloat(document.getElementById('laborHours').value) || 0;

  const area = L * H;
  const bricksPerSqFt = 6.75;
  let bricks = Math.ceil(area * bricksPerSqFt * (1 + waste/100));
  const materialsCost = bricks * brickPrice + mortarBags * mortarPrice;
  const laborCost = laborRate * laborHours;
  const total = materialsCost + laborCost;

  document.getElementById('rArea').textContent = area.toFixed(1) + ' sq ft';
  document.getElementById('rBricks').textContent = bricks.toLocaleString();
  document.getElementById('rMaterials').textContent = '$' + materialsCost.toFixed(2);
  document.getElementById('rLabor').textContent = '$' + laborCost.toFixed(2);
  document.getElementById('rTotal').textContent = '$' + total.toFixed(2);
  return {area, bricks, materialsCost, laborCost, total};
}

function downloadPDF(){
  const data = calculate();
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const job = document.getElementById('jobName').value || 'Masonry Job';
  const business = document.getElementById('businessName').value || 'Brick Bid Pro';

  doc.setFontSize(18);
  doc.text(business, 20, 22);
  doc.setFontSize(12);
  doc.text('Professional Masonry Quote', 20, 32);
  doc.setFontSize(11);
  doc.text('Job: ' + job, 20, 45);
  doc.text('Date: ' + new Date().toLocaleDateString(), 20, 52);

  let y = 70;
  const addLine = (l, r) => { doc.text(l, 20, y); doc.text(r, 180, y, {align:'right'}); y += 8; };
  addLine('Wall area:', document.getElementById('rArea').textContent);
  addLine('Bricks needed:', document.getElementById('rBricks').textContent);
  addLine('Materials:', document.getElementById('rMaterials').textContent);
  addLine('Labor:', document.getElementById('rLabor').textContent);
  y += 4;
  doc.setFontSize(14);
  addLine('Total Bid:', document.getElementById('rTotal').textContent);

  if(!isPro){
    doc.setFontSize(30);
    doc.setTextColor(200,200,200);
    doc.text('BRICK BID PRO - FREE', 105, 150, {align:'center', angle:45});
    doc.setTextColor(0,0,0);
  }

  doc.setFontSize(10);
  doc.text('Thank you for your business. Valid for 30 days.', 20, 260);
  doc.save((job.replace(/[^a-z0-9]/gi,'_') || 'quote') + '_BrickBidPro.pdf');
}

function goStripe(){
  const link = document.getElementById('stripeLink').value.trim();
  if(link && link.startsWith('http')) window.open(link, '_blank');
  else alert('Add your Stripe Payment Link in Settings first.');
}

function shareApp(){
  const url = window.location.origin + window.location.pathname + '?pro=1';
  if(navigator.share){ navigator.share({title:'Brick Bid Pro', url}); }
  else { navigator.clipboard.writeText(url); alert('Link copied: ' + url); }
}

calculate();
</script>
</body>
</html>
